---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build & Publish Container

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  release:
    name: Release
    permissions:
      contents: read
      id-token: write # cosign keyless signing
      packages: write
    # Docker's official reusable builder: multi-arch (native runners, no QEMU),
    # SBOM attestation and cosign signing handled for us.
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=raw,value=rolling,enable=${{ github.event_name == 'release' }}
        type=ref,event=branch
      output: image
      platforms: linux/amd64,linux/arm64
      push: true
      sbom: true
      sign: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
